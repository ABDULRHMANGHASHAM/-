<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحول الرقمي | بلدية صبيا</title>
    <style>
        :root {
            --primary-green: #4b7838;
            --light-green: #e2edd9;
            --bg-gray: #f4f4f4;
            --text-dark: #333;
            --border-color: #cccccc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-gray); color: var(--text-dark); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        /* شاشة تسجيل الدخول المطابقة تماماً للصورة */
        .login-card { background: white; width: 100%; max-width: 750px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; text-align: center; border: 1px solid #e0e0e0; }
        .login-header { background: #e6e6e6; padding: 20px; border-bottom: 2px solid #dbdbdb; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .logo-placeholder { width: 55px; height: 55px; background: #0c8891; clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; }
        .login-header h1 { font-size: 1.1rem; color: #1e3a2f; font-weight: 700; }
        .login-header h2 { font-size: 0.9rem; color: #444; }
        .login-body { padding: 40px 60px; }
        .login-title { font-size: 1.2rem; color: var(--primary-green); font-weight: bold; margin-bottom: 12px; }
        .form-group { margin-bottom: 25px; text-align: center; }
        .form-group label { display: block; font-size: 1.1rem; font-weight: bold; color: var(--primary-green); margin-bottom: 10px; }
        .login-input { width: 100%; max-width: 400px; background-color: var(--light-green); border: 1px solid var(--primary-green); padding: 12px; border-radius: 6px; text-align: center; font-size: 1rem; color: #666; }
        .login-input::placeholder { color: #a5c498; }
        .btn-login { background-color: var(--primary-green); color: white; border: none; width: 100%; max-width: 400px; padding: 12px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-login:hover { background-color: #3b5e2b; }
        .admin-link { display: inline-block; margin-top: 30px; color: var(--primary-green); text-decoration: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; }

        /* النظام الرئيسي بعد الدخول */
        .main-container { background: white; width: 100%; max-width: 1000px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; display: none; border-top: 6px solid var(--primary-green); }
        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg-gray); padding-bottom: 15px; margin-bottom: 25px; }
        .main-header h2 { color: var(--primary-green); font-size: 1.3rem; }
        .logout-btn { background: #d9534f; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }

        /* التصميم الداخلي للوحة التحكم */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .panel-box { border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; background: #fafafa; }
        .panel-title { font-weight: bold; color: var(--primary-green); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 15px; font-size: 0.95rem; }
        
        .control-input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; background: #fff; }
        .control-input[readonly] { background: #eee; cursor: not-allowed; }

        .services-list { display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; background: white; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; }
        .service-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }

        .btn-action { background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 0.95rem; }
        .btn-action:hover { background: #3b5e2b; }

        /* جدول المسؤول */
        .table-wrapper { overflow-x: auto; margin-top: 15px; border: 1px solid var(--border-color); border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; text-align: right; font-size: 0.85rem; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); }
        th { background: #f0f0f0; color: #555; }
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background: #fcf8e3; color: #8a6d3b; border: 1px solid #faebcc; }
        .status-success { background: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
        
        select.status-select { padding: 3px; font-size: 0.8rem; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- ================= 1. واجهة تسجيل الدخول (نفس الصورة تماماً) ================= -->
    <div class="login-card" id="loginInterface">
        <div class="login-header">
            <div class="logo-placeholder">بلدية صبيا</div>
            <h1>أمانة منطقة جازان</h1>
            <h2>بلدية محافظة صبيا</h2>
        </div>
        <div class="login-body">
            <div class="login-title">نظام التحول الرقمي | دعم</div>
            <div style="font-size: 0.85rem; color: #777; margin-bottom: 30px;">بلدية محافظة صبيا</div>

            <!-- تسجيل دخول الموظف -->
            <div id="employeeForm">
                <div class="form-group">
                    <label>رقم الموظف</label>
                    <input type="text" id="employeeIdInput" class="login-input" placeholder="مثال: 123">
                </div>
                <button class="btn-login" onclick="loginAsEmployee()">تسجيل دخول</button>
            </div>

            <!-- تسجيل دخول المسؤول (مخفي يظهر بالضغط) -->
            <div id="adminForm" style="display: none;">
                <div class="form-group">
                    <label>كلمة مرور مسؤول النظام</label>
                    <input type="password" id="adminPasswordInput" class="login-input" placeholder="••••••••">
                </div>
                <button class="btn-login" style="background-color: #315224;" onclick="loginAsAdmin()">دخول المسؤول</button>
            </div>

            <div class="admin-link" id="toggleAdminLink" onclick="showAdminForm()">دخول مسؤول النظام</div>
        </div>
    </div>

    <!-- ================= 2. النظام الرئيسي بعد تسجيل الدخول ================= -->
    <div class="main-container" id="mainSystem">
        <div class="main-header">
            <div>
                <h2 id="systemGreeting">نظام الدعم الرقمي</h2>
                <span id="userRoleBadge" style="font-size: 0.8rem; color: #666;"></span>
            </div>
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        </div>

        <div class="dashboard-grid">
            <!-- قسم الموظف: رفع طلب -->
            <div class="panel-box" id="employeePanel">
                <div class="panel-title">📝 رفع طلب دعم جديد</div>
                <label style="font-size: 0.8rem; color: #666;">الرقم الوظيفي</label>
                <input type="text" id="sysEmpId" class="control-input" readonly>
                
                <label style="font-size: 0.8rem; color: #666;">اختر الخدمات المطلوبة:</label>
                <div class="services-list" id="servicesChecklist">
                    <!-- الخدمات تظهر هنا ديناميكياً -->
                </div>
                <br>
                <button class="btn-action" onclick="createNewTicket()">حفظ وإرسال الطلب</button>
            </div>

            <!-- قسم المسؤول: إضافة خدمات (يظهر للمسؤول فقط) -->
            <div class="panel-box" id="adminControlPanel" style="display: none;">
                <div class="panel-title">⚙️ إدارة النظام (صلاحيات المسؤول)</div>
                <label style="font-size: 0.8rem; color: #666;">إضافة خدمة جديدة للنظام</label>
                <input type="text" id="newServiceInput" class="control-input" placeholder="مثال: أمن سيبراني، صيانة شبكات...">
                <button class="btn-action" style="background: #2e4d20;" onclick="addNewService()">إضافة الخدمة فوراً</button>
            </div>
        </div>

        <!-- سجل الطلبات (يظهر للكل، لكن المسؤول يقدر يعدل الحالات) -->
        <div class="panel-box" style="width: 100%;">
            <div class="panel-title">📋 سجل الطلبات والتحولات المحفوظة (Google LocalStorage)</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>رقم الموظف</th>
                            <th>الخدمات المطلوبة</th>
                            <th>التاريخ والوقت</th>
                            <th>الحالة</th>
                            <th id="thAction" style="display: none;">الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="ticketsTableBody">
                        <!-- البيانات تستدعى تلقائياً من الذاكرة هنا -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // مصفوفة البداية للخدمات في حال كانت الذاكرة فارغة
        const defaultServices = ["أنظمة", "أجهزة", "طابعات", "ماسح ضوئي", "شبكة نت"];
        
        // التحقق وجلب البيانات من ذاكرة المتصفح المستديمة (LocalStorage)
        let services = JSON.parse(localStorage.getItem('sabya_services')) || defaultServices;
        let tickets = JSON.parse(localStorage.getItem('sabya_tickets')) || [];
        
        let currentUser = null;
        let currentUserRole = null; // 'employee' أو 'admin'

        // حفظ البيانات في الذاكرة
        function saveToStorage() {
            localStorage.setItem('sabya_services', JSON.stringify(services));
            localStorage.setItem('sabya_tickets', JSON.stringify(tickets));
        }

        function showAdminForm() {
            document.getElementById('employeeForm').style.display = 'none';
            document.getElementById('adminForm').style.display = 'block';
            document.getElementById('toggleAdminLink').style.display = 'none';
        }

        // تسجيل دخول الموظف
        function loginAsEmployee() {
            const empId = document.getElementById('employeeIdInput').value.trim();
            if(!empId) return alert('الرجاء كتابة رقم الموظف أولاً');
            
            currentUser = empId;
            currentUserRole = 'employee';
            launchSystem();
        }

        // تسجيل دخول المسؤول بكلمة المرور المشروطة
        function loginAsAdmin() {
            const pass = document.getElementById('adminPasswordInput').value.trim();
            if(pass === "0581789770") {
                currentUser = "مسؤول النظام";
                currentUserRole = 'admin';
                launchSystem();
            } else {
                alert('كلمة المرور خاطئة! حاول مجدداً.');
            }
        }

        // تشغيل واجهة النظام وحقن الصلاحيات
        function launchSystem() {
            document.getElementById('loginInterface').style.display = 'none';
            document.getElementById('mainSystem').style.display = 'block';
            
            document.getElementById('systemGreeting').innerText = `مرحباً بك: ${currentUser}`;
            document.getElementById('sysEmpId').value = currentUser;

            if(currentUserRole === 'admin') {
                document.getElementById('userRoleBadge').innerText = "صلاحية: مسؤول النظام كامله";
                document.getElementById('adminControlPanel').style.display = 'block';
                document.getElementById('thAction').style.display = 'table-cell';
                document.getElementById('employeePanel').style.opacity = '0.5'; // تعطيل رمزي للمسؤول عن رفع الطلبات العادية
            } else {
                document.getElementById('userRoleBadge').innerText = "صلاحية: موظف بلدية صبيا";
                document.getElementById('adminControlPanel').style.display = 'none';
                document.getElementById('thAction').style.display = 'none';
                document.getElementById('employeePanel').style.opacity = '1';
            }

            renderServices();
            renderTicketsTable();
        }

        // رندر قائمة الخدمات
        function renderServices() {
            const container = document.getElementById('servicesChecklist');
            container.innerHTML = '';
            services.forEach(srv => {
                container.innerHTML += `
                    <label class="service-item">
                        <input type="checkbox" name="srv_checkbox" value="${srv}">
                        <span>${srv}</span>
                    </label>
                `;
            });
        }

        // رندر جدول المشاكل والطلبات
        function renderTicketsTable() {
            const tbody = document.getElementById('ticketsTableBody');
            tbody.innerHTML = '';

            if(tickets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999;">لا توجد طلبات مسجلة بعد في الذاكرة</td></tr>`;
                return;
            }

            tickets.forEach((ticket, index) => {
                const statusClass = ticket.status === 'منجز' ? 'status-success' : 'status-pending';
                
                let actionCell = '';
                if(currentUserRole === 'admin') {
                    actionCell = `
                        <td>
                            <select class="status-select" onchange="updateTicketStatus(${index}, this.value)">
                                <option value="جديد" ${ticket.status === 'جديد' ? 'selected' : ''}>جديد</option>
                                <option value="منجز" ${ticket.status === 'منجز' ? 'selected' : ''}>منجز</option>
                            </select>
                        </td>
                    `;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${ticket.empId}</td>
                        <td>${ticket.neededServices}</td>
                        <td>${ticket.date}</td>
                        <td><span class="status-badge ${statusClass}">${ticket.status}</span></td>
                        ${actionCell}
                    </tr>
                `;
            });
        }

        // الموظف: رفع طلب جديد وحفظه بالذاكرة
        function createNewTicket() {
            if(currentUserRole === 'admin') return alert('عذراً، أنت داخل بحساب المسؤول. يرجى الدخول بحساب موظف لرفع طلب.');
            
            const checkedBoxes = Array.from(document.querySelectorAll('input[name="srv_checkbox"]:checked')).map(i => i.value);
            if(checkedBoxes.length === 0) return alert('الرجاء اختيار خدمة واحدة على الأقل');

            const newTicket = {
                empId: currentUser,
                neededServices: checkedBoxes.join(' - '),
                date: new Date().toLocaleString('ar-SA'),
                status: 'جديد'
            };

            tickets.push(newTicket);
            saveToStorage();
            renderTicketsTable();
            
            // تفريغ الاختيارات بعد الحفظ
            document.querySelectorAll('input[name="srv_checkbox"]').forEach(i => i.checked = false);
            alert('✅ تم حفظ المشكلة والطلب بنجاح داخل ذاكرة النظام المستديمة!');
        }

        // المسؤول: إضافة خدمة جديدة للسيستم وحفظها بالذاكرة
        function addNewService() {
            const input = document.getElementById('newServiceInput');
            const val = input.value.trim();
            if(!val) return alert('الرجاء كتابة اسم الخدمة أولاً');

            services.push(val);
            saveToStorage();
            renderServices();
            input.value = '';
            alert(`🎉 تم إضافة خدمة "${val}" وتعميمها بنجاح!`);
        }

        // المسؤول: تعديل حالة الطلب وحفظ التحديث بالذاكرة
        function updateTicketStatus(index, newStatus) {
            tickets[index].status = newStatus;
            saveToStorage();
            renderTicketsTable();
        }

        function logout() {
            currentUser = null;
            currentUserRole = null;
            document.getElementById('employeeIdInput').value = '';
            document.getElementById('adminPasswordInput').value = '';
            document.getElementById('employeeForm').style.display = 'block';
            document.getElementById('adminForm').style.display = 'none';
            document.getElementById('toggleAdminLink').style.display = 'inline-block';
            document.getElementById('mainSystem').style.display = 'none';
            document.getElementById('loginInterface').style.display = 'block';
        }
    </script>
</body>
</html>
